<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Biblical Meditation maskable icon">
  <!-- Maskable icons should keep important content within the safe area. -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5ecfff"/>
      <stop offset="0.55" stop-color="#7c7bf0"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="35%" r="85%">
      <stop offset="0" stop-color="#12183a"/>
      <stop offset="1" stop-color="#060814"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
