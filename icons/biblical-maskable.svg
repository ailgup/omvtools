  <g transform="translate(64 64)">
    <rect width="384" height="384" rx="96" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
    <circle cx="150" cy="150" r="86" fill="url(#g)" opacity="0.95"/>
